<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css">
    <title>Comentários</title>
</head>
<body>
    <img src="img/comentario.png" id="comente" width="400px" height="320px">
<div id="grade">
    
    <form action="" method="POST">

        <label for="nome">Nome</label><br>
        <input type="text" placeholder="Digite seu nome completo" name="nome" id="nome">
        <br><br>

        <label for="nome">Telefone</label><br>
        <input type="number" placeholder="Digite seu telefone(exemplo: 71987564499)" name="telefone" id="telefone">
        <br><br>

        <label for="nome">E-mail</label><br>
        <input type="email" placeholder="Digite um e-mail válido" name="email" id="email">
        <br><br>

        <label for="nome">Faça um Comentário:</label><br><br>
        <input type="text" name="comentario" id="comentario">
  
    </form>
</div>
</body>
</html>
